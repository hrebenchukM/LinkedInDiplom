version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: linkedin-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: linkedin_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - linkedin-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: linkedin-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=linkedin_dev;Username=postgres;Password=postgres
      - JwtSettings__SecretKey=docker-development-secret-key-min-32-characters-for-testing
      - JwtSettings__Issuer=LinkedInAPI
      - JwtSettings__Audience=LinkedInClients
      - JwtSettings__AccessTokenExpirationMinutes=60
      - JwtSettings__RefreshTokenExpirationDays=30
    ports:
      - "5000:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - linkedin-network
    restart: unless-stopped

networks:
  linkedin-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
